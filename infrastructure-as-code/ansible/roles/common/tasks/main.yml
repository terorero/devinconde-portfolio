---
# Common role - Base configuration for all servers
# Devin Conde Mancilla

- name: Set timezone to America/La_Paz
  timezone:
    name: America/La_Paz
  tags: ['common', 'timezone']

- name: Configure hostname
  hostname:
    name: "{{ inventory_hostname }}"
  tags: ['common', 'hostname']

- name: Update /etc/hosts
  template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'
  tags: ['common', 'hosts']

- name: Install essential packages
  package:
    name:
      - vim
      - htop
      - iotop
      - nethogs
      - iftop
      - tcpdump
      - strace
      - lsof
      - net-tools
      - iproute2
      - bind-utils
      - dnsutils
      - telnet
      - nc
      - socat
      - rsync
      - tar
      - gzip
      - bzip2
      - xz
      - unzip
      - p7zip
      - tree
      - jq
      - yq
      - git
      - curl
      - wget
      - ca-certificates
      - gnupg2
      - lsb-release
      - dmidecode
      - smartmontools
      - hdparm
      - lshw
      - pciutils
      - usbutils
      - numactl
      - hwloc
      - stress-ng
      - sysstat
      - iostat
      - mpstat
      - pidstat
      - sar
      - atop
      - glances
      - btop
      - bpftrace
      - bcc-tools
    state: present
  tags: ['common', 'packages']

- name: Configure vim as default editor
  alternatives:
    name: editor
    path: /usr/bin/vim.basic
  tags: ['common', 'editor']

- name: Configure bash history
  blockinfile:
    path: /etc/bash.bashrc
    block: |
      # Enhanced bash history
      export HISTSIZE=10000
      export HISTFILESIZE=20000
      export HISTTIMEFORMAT="%F %T "
      export HISTCONTROL=ignoredups:erasedups
      shopt -s histappend
      PROMPT_COMMAND="history -a; history -n; $PROMPT_COMMAND"
    marker: "# ANSIBLE BASH HISTORY"
  tags: ['common', 'bash']

- name: Configure sysctl baseline
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: 'vm.swappiness', value: '10' }
    - { key: 'vm.dirty_ratio', value: '15' }
    - { key: 'vm.dirty_background_ratio', value: '5' }
    - { key: 'vm.overcommit_memory', value: '1' }
    - { key: 'vm.overcommit_ratio', value: '50' }
    - { key: 'net.core.somaxconn', value: '65535' }
    - { key: 'net.core.netdev_max_backlog', value: '5000' }
    - { key: 'net.ipv4.tcp_max_syn_backlog', value: '8192' }
    - { key: 'net.ipv4.tcp_syncookies', value: '1' }
    - { key: 'net.ipv4.tcp_tw_reuse', value: '1' }
    - { key: 'net.ipv4.tcp_fin_timeout', value: '15' }
    - { key: 'net.ipv4.tcp_keepalive_time', value: '300' }
    - { key: 'net.ipv4.tcp_keepalive_probes', value: '5' }
    - { key: 'net.ipv4.tcp_keepalive_intvl', value: '15' }
    - { key: 'fs.file-max', value: '2097152' }
    - { key: 'fs.inotify.max_user_watches', value: '524288' }
    - { key: 'fs.inotify.max_user_instances', value: '8192' }
    - { key: 'kernel.pid_max', value: '4194304' }
  tags: ['common', 'sysctl']

- name: Configure limits.conf
  pam_limits:
    domain: '*'
    limit_type: '{{ item.type }}'
    limit_item: '{{ item.item }}'
    value: '{{ item.value }}'
  loop:
    - { type: 'soft', item: 'nofile', value: '65535' }
    - { type: 'hard', item: 'nofile', value: '65535' }
    - { type: 'soft', item: 'nproc', value: '65535' }
    - { type: 'hard', item: 'nproc', value: '65535' }
    - { type: 'soft', item: 'memlock', value: 'unlimited' }
    - { type: 'hard', item: 'memlock', value: 'unlimited' }
  tags: ['common', 'limits']

- name: Configure journald
  blockinfile:
    path: /etc/systemd/journald.conf
    block: |
      [Journal]
      Storage=persistent
      Compress=yes
      Seal=yes
      SplitMode=uid
      SyncIntervalSec=5m
      RateLimitIntervalSec=30s
      RateLimitBurst=10000
      SystemMaxUse=2G
      SystemMaxFileSize=200M
      MaxRetentionSec=30day
      ForwardToSyslog=yes
    marker: "# ANSIBLE JOURNALD"
  notify: restart systemd-journald
  tags: ['common', 'journald']

- name: Enable and start essential services
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - chronyd
    - systemd-timesyncd
    - rsyslog
    - auditd
    - fail2ban
  tags: ['common', 'services']

- name: Configure motd
  copy:
    dest: /etc/motd
    content: |
      ╔═══════════════════════════════════════════════════════════════════╗
      ║                    AUTHORIZED ACCESS ONLY                        ║
      ║                                                                  ║
      ║  This system is managed by Ansible - Devin Conde Mancilla       ║
      ║  https://www.devinconde.com                                      ║
      ║                                                                  ║
      ║  All access is logged and monitored. Unauthorized access is     ║
      ║  prohibited and will be prosecuted.                             ║
      ╚═══════════════════════════════════════════════════════════════════╝
    mode: '0644'
  tags: ['common', 'motd']

- name: Remove MOTD dynamic scripts
  file:
    path: /etc/update-motd.d
    state: absent
  tags: ['common', 'motd']

- name: Install and configure logrotate for custom logs
  template:
    src: logrotate-custom.j2
    dest: /etc/logrotate.d/custom
    owner: root
    group: root
    mode: '0644'
  tags: ['common', 'logrotate']

- name: Create admin user with sudo access
  user:
    name: "{{ admin_user }}"
    comment: "System Administrator"
    shell: /bin/bash
    groups: "wheel,sudo,adm,systemd-journal"
    append: true
    create_home: true
    ssh_key_file: .ssh/authorized_keys
  tags: ['common', 'users']

- name: Configure sudo for admin group
  copy:
    dest: /etc/sudoers.d/99-admin
    content: |
      # Admin group - full sudo with logging
      %wheel  ALL=(ALL) ALL
      %sudo   ALL=(ALL) ALL
      
      # Defaults
      Defaults    secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      Defaults    logfile="/var/log/sudo.log"
      Defaults    log_input, log_output
      Defaults    requiretty
      Defaults    timestamp_timeout=5
      Defaults    passwd_tries=3
      Defaults    badpass_message="Access denied. Attempt logged."
      Defaults    !env_reset
      Defaults    env_keep += "LANG LANGUAGE LC_*"
    mode: '0440'
    validate: 'visudo -cf %s'
  tags: ['common', 'sudo']

- name: Setup SSH authorized_keys for admin
  authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ item }}"
  loop: "{{ admin_ssh_keys }}"
  tags: ['common', 'ssh', 'users']

  handlers:
    - name: restart systemd-journald
      systemd:
        name: systemd-journald
        state: restarted
      listen: restart systemd-journald